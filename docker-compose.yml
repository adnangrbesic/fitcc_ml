services:
  db:
    image: ankane/pgvector
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: buyguardian
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_NUM_CTX=2048
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./ollama_storage:/root/.ollama
    restart: always

  ollama-setup:
    image: alpine:latest
    command: >
       sh -c "apk add --no-cache curl && sleep 20 && 
            curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"qwen2.5:7b\"}' &&
           curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"nomic-embed-text\"}' &&
           curl http://ollama:11434/api/generate -d '{\"model\": \"qwen2.5:7b\"}' &&
           curl http://ollama:11434/api/embeddings -d '{\"model\": \"nomic-embed-text\", \"prompt\": \"warmup\"}'"
               
    depends_on:
      - ollama
    restart: on-failure

  api:
    build:
      context: ./backend/BuyGuardian.Api
      dockerfile: Dockerfile
    ports:
      - "5000:80"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=buyguardian;Username=postgres;Password=postgres
      - Redis__Configuration=redis:6379
      - RabbitMQ__HostName=rabbitmq
      - Ollama__BaseUrl=http://ollama:11434
      - Ollama__EmbeddingModel=nomic-embed-text
      - TrustScoreService__BaseUrl=http://ml-service-listing:8010
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - db
      - redis
      - rabbitmq
      - ollama
    restart: always

  scraper:
    build:
      context: ./scraper_engine
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_HOST=rabbitmq
      - LLM_PROVIDER=ollama
      - LLM_BASE_URL=http://ollama:11434/v1
      - LLM_MODEL=qwen2.5:7b
      - LLM_VALIDATE_OUTPUT_SCHEMA=True
      - LLM_TIMEOUT_SEC=300
    depends_on:
      - redis
      - rabbitmq
      - ollama
    volumes:
      - ./scraper_engine:/app
    command: ["python", "-m", "scraper.worker", "--redis", "redis://redis:6379", "--queue", "olx:urls"]
    restart: always
    deploy:
      replicas: 2

  enricher:
    build:
      context: ./scraper_engine
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_HOST=rabbitmq
      - LLM_PROVIDER=ollama
      - LLM_BASE_URL=http://ollama:11434/v1
      - LLM_MODEL=qwen2.5:7b
      - LLM_TIMEOUT_SEC=600
    depends_on:
      - redis
      - rabbitmq
      - ollama
    volumes:
      - ./scraper_engine:/app
    command: ["python", "-m", "scraper.enrich_queue"]
    restart: always
    deploy:
      replicas: 1

  ml-service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/buyguardian
      - REDIS_URL=redis://redis:6379
      - IF_CONTAMINATION=0.05
      - IF_N_ESTIMATORS=200
      - RETRAIN_INTERVAL_HOURS=6
      - MIN_LISTINGS_FOR_IFOREST=5
      - MIN_LISTINGS_FOR_ZSCORE=3
      - LOG_LEVEL=INFO
    depends_on:
      - db
      - redis
    restart: always

  ml-service-listing:
    build:
      context: ./ml_service_listing
      dockerfile: Dockerfile
    ports:
      - "8010:8010"
    environment:
      - MODEL_PATH=/app/model/model.cbm
      - TRAINING_DATA_PATH=/app/training/data/listings.json
      - RETRAIN_ENABLED=true
      - RETRAIN_ITERATIONS=50
      - LOG_LEVEL=INFO
    volumes:
      - ./ml_service_listing/ml_service_listing/model.cbm:/app/model/model.cbm
      - ./ml_service_listing/ml_service_listing/training/data:/app/training/data
    restart: always

volumes:
  postgres_data:
