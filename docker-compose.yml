services:
  db:
    image: ankane/pgvector
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: buyguardian
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./ollama_storage:/root/.ollama
    restart: always

  ollama-setup:
    image: alpine:latest
    command: >
        sh -c "apk add --no-cache curl && sleep 20 && 
               curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3\"}' &&
               curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"nomic-embed-text\"}'"
    depends_on:
      - ollama
    restart: on-failure

  api:
    build:
      context: ./backend/BuyGuardian.Api
      dockerfile: Dockerfile
    ports:
      - "5000:80"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=buyguardian;Username=postgres;Password=postgres
      - Redis__Configuration=redis:6379
      - RabbitMQ__HostName=rabbitmq
      - Ollama__BaseUrl=http://ollama:11434
      - Ollama__EmbeddingModel=nomic-embed-text
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - db
      - redis
      - rabbitmq
      - ollama
    restart: always

  scraper:
    build:
      context: ./scraper_engine
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_HOST=rabbitmq
      - LLM_PROVIDER=ollama
      - LLM_BASE_URL=http://ollama:11434/v1
      - LLM_MODEL=llama3
      - LLM_VALIDATE_OUTPUT_SCHEMA=True
      - LLM_TIMEOUT_SEC=300
    depends_on:
      - redis
      - rabbitmq
      - ollama
    volumes:
      - ./scraper_engine:/app
    command: ["python", "-m", "scraper.worker", "--redis", "redis://redis:6379", "--queue", "olx:urls"]
    restart: always

  enricher:
    build:
      context: ./scraper_engine
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_HOST=rabbitmq
      - LLM_PROVIDER=ollama
      - LLM_BASE_URL=http://ollama:11434/v1
      - LLM_MODEL=llama3
      - LLM_TIMEOUT_SEC=300
    depends_on:
      - redis
      - rabbitmq
      - ollama
    volumes:
      - ./scraper_engine:/app
    command: ["python", "-m", "scraper.enrich_queue"]
    restart: always
    deploy:
      replicas: 2

volumes:
  postgres_data:
